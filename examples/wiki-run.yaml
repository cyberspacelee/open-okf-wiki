version: 1
operation: generate

# String form (simplest). OpenAI-compatible gateways still use the openai: prefix with the
# served model name, e.g. openai:qwen2.5-72b-instruct, and set OPENAI_BASE_URL in .env.
model: openai:gpt-5-mini

# Object form (optional non-secret sampling / output caps):
# model:
#   identity: openai:gpt-5-mini
#   max_tokens: 8192
#   temperature: 0.2
#   timeout: 120

# Optional separate Host Wiki Reviewer model (falls back to model above):
# reviewer_model: anthropic:claude-sonnet-4-6

# Paths are relative to this YAML file.
staging: ../.scratch/wiki-staging
publication: ../wiki
# After successful publication, write static HTML + link graph under publication/viz/.
write_visualization: false

# Paths are resolved relative to this YAML file. Each repository must select exactly one branch or
# exact revision. Branches are frozen to exact commits before model work starts.
# Provider credentials stay in process environment or .env — never in this file.
repositories:
  - id: application
    path: ../path/to/application
    branch: main
    # Host Default Source Ignores (node_modules, dist, venv, …) apply when true.
    apply_default_source_ignores: true
    # Optional extra repository-relative fnmatch patterns (additive).
    ignore:
      - "generated/*"
      - "*.min.js"

  - id: documentation
    path: ../path/to/documentation
    revision: 0123456789abcdef0123456789abcdef01234567
    apply_default_source_ignores: true
    ignore:
      - "drafts/**"

# Omitted limit keys still take OKF_WIKI_* env defaults, then product defaults.
limits:
  request_limit: 50
  tool_calls_limit: 200
  # Operational context target for compaction (not the provider hard window).
  context_target_tokens: 100000
  input_tokens_limit: 250000
  output_tokens_limit: 100000
  total_tokens_limit: 350000
  request_timeout_seconds: 120
  wall_clock_timeout_seconds: 600
