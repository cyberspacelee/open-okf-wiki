name: CI

on:
  pull_request:
  push:

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @okf-wiki/contract test
      - run: pnpm --filter @okf-wiki/core test
      - run: pnpm --filter @okf-wiki/agent test
      - run: pnpm --filter @okf-wiki/server typecheck
      - run: pnpm --filter @okf-wiki/web typecheck

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @okf-wiki/web exec playwright install chromium --with-deps
      - run: pnpm --filter @okf-wiki/web test:e2e
        env:
          CI: "true"
