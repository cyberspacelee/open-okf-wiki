name: CI

on:
  pull_request:
  push:

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Unit tests (contract / core / agent)
        run: |
          pnpm --filter @okf-wiki/contract test
          pnpm --filter @okf-wiki/core test
          pnpm --filter @okf-wiki/agent test
      - name: Typecheck all packages
        run: pnpm typecheck
      - name: ESLint
        run: pnpm lint

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @okf-wiki/web exec playwright install chromium --with-deps
      - run: pnpm test:e2e
        env:
          CI: "true"
