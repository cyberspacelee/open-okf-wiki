name: CI

on:
  pull_request:
  push:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.28"
          enable-cache: true
      - run: uv python install
      - run: uv lock --check
      - run: uv sync --locked
      - run: uv run --locked ruff format --check .
      - run: uv run --locked ruff check .
      - run: uv run --locked ty check src tests
      - run: git diff --check
      - run: uv run --locked pytest -m "not package_release"
      - run: uv run --locked pytest -m package_release tests/test_package_release.py
        env:
          OKF_WIKI_RELEASE_DIST: ${{ github.workspace }}/dist
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: release-artifacts
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
