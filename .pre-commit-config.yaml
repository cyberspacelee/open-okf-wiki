# Generic repo hygiene hooks (no Python / uv).
# Install: pre-commit install
# Run all:  pre-commit run -a

fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(refs/|packages/skill/)
      - id: end-of-file-fixer
        exclude: ^(refs/|packages/skill/)
      - id: check-merge-conflict
      - id: check-yaml
        exclude: ^refs/
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
